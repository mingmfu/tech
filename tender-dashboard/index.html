<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安徽审计招标信息 Dashboard - 精选项目</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="gradient-bg text-white py-8 px-4">
        <div class="max-w-7xl mx-auto">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <div>
                    <h1 class="text-3xl font-bold flex items-center gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        安徽审计招标信息 Dashboard
                    </h1>
                    <p class="mt-2 text-purple-100">合信招标网安徽地区审计项目 | 实时更新</p>
                </div>
                <div class="text-right">
                    <div class="text-sm text-purple-100">数据更新时间</div>
                    <div class="text-xl font-semibold">2026-03-14 14:45</div>
                    <div class="text-xs text-purple-200 mt-1">8个安徽项目</div>
                </div>
            </div>
            
            <!-- Stats -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-8">
                <div class="bg-white/20 backdrop-blur rounded-lg p-4">
                    <div class="text-3xl font-bold">8</div>
                    <div class="text-sm text-purple-100">安徽项目</div>
                </div>
                <div class="bg-white/20 backdrop-blur rounded-lg p-4">
                    <div class="text-3xl font-bold text-yellow-300">2</div>
                    <div class="text-sm text-purple-100">10-30万</div>
                </div>
                <div class="bg-white/20 backdrop-blur rounded-lg p-4">
                    <div class="text-3xl font-bold text-green-300">3</div>
                    <div class="text-sm text-purple-100"><10万</div>
                </div>
                <div class="bg-white/20 backdrop-blur rounded-lg p-4">
                    <div class="text-3xl font-bold text-blue-300">3</div>
                    <div class="text-sm text-purple-100">待查金额</div>
                </div>
            </div>
        </div>
    </header>

    <!-- Filters -->
    <div class="max-w-7xl mx-auto px-4 py-6">
        <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
            <div class="flex flex-wrap gap-4 items-center">
                <div class="flex-1 min-w-[300px]">
                    <div class="relative">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
                        <input type="text" id="searchInput" placeholder="搜索项目名称、招标单位..." 
                            class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                    </div>
                </div>
                
                <select id="regionFilter" class="px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-purple-500">
                    <option value="">全部地区</option>
                    <option value="安徽" selected>安徽</option>
                </select>
                
                <select id="amountFilter" class="px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-purple-500">
                    <option value="">全部金额</option>
                    <option value="30">≥30万</option>
                    <option value="10">10-30万</option>
                    <option value="0"><10万</option>
                </select>

                <button onclick="resetFilters()" class="px-4 py-2 bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200 transition-colors">
                    重置筛选
                </button>
            </div>
        </div>

        <!-- Project Count -->
        <div class="mb-4 flex items-center justify-between">
            <div class="text-gray-600">
                显示 <span id="showingCount" class="font-semibold text-purple-600 text-xl">8</span> 个安徽项目
                <span class="text-sm text-gray-400 ml-2">（数据来源：合信招标网）</span>
            </div>
        </div>

        <!-- Project Grid -->
        <div id="projectGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        
        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-20">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="text-gray-300 mx-auto mb-4"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            <p class="text-gray-500">没有找到符合条件的项目</p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-gray-900 text-gray-400 py-8 px-4 mt-12">
        <div class="max-w-7xl mx-auto text-center">
            <p>数据来源：合信招标网 (china-hxzb.com)</p>
            <p class="mt-2 text-sm">© 2026 安徽审计招标信息平台 | 共8个项目</p>
        </div>
    </footer>

    <script>
        // 安徽地区审计招标数据（来自合信招标网）
        const tenderData = [
            {"name":"芜湖凤鸣控股集团资产专项审计服务","unit":"芜湖凤鸣控股集团有限公司","amount":"29万元","deadline":"2026-03-13","region":"安徽","link":"https://www.china-hxzb.com/zhaobiao/show.php?itemid=31188065","type":"专项审计","advice":"🔴强烈推荐 | 💰最高预算 | 🏢国企背景"},
            {"name":"合肥蜀山高科园区2025年度财务报表审计","unit":"合肥蜀山高科园区发展有限公司","amount":"","deadline":"2026-03-13","region":"安徽","link":"https://www.china-hxzb.com/zhaobiao/show.php?itemid=31190533","type":"年度财务报表审计","advice":"🟠重点推荐 | 🏢国企背景 | 📍合肥高新区"},
            {"name":"中安资本2025年度审计机构选聘","unit":"中安资本","amount":"5.8万元","deadline":"2026-03-11 09:30","region":"安徽","link":"https://www.china-hxzb.com/zhaobiao/show.php?itemid=31166411","type":"年度审计","advice":"🟡一般推荐 | 💼资本运作 | ⏰即将截止"},
            {"name":"安徽省皖能股份2026-2028年报审计","unit":"安徽省皖能股份有限公司","amount":"","deadline":"2026-03-03","region":"安徽","link":"https://www.china-hxzb.com/zhaobiao/show.php?itemid=31030797","type":"年报审计","advice":"🟠重点推荐-长期项目 | ⚡能源行业 | 📈上市公司"},
            {"name":"安徽安上装备2025年审及离任审计","unit":"安徽安上装备科技有限公司","amount":"","deadline":"2026-03-07 09:53","region":"安徽","link":"https://www.china-hxzb.com/zhaobiao/show.php?itemid=31040740","type":"离任审计","advice":"🟡一般推荐 | 👤高管离任 | 🏭装备制造"},
            {"name":"天长市村(社区)经济责任审计服务","unit":"天长市审计局","amount":"","deadline":"2026-03-11","region":"安徽","link":"https://www.china-hxzb.com/zhaobiao/show.php?itemid=31148243","type":"经济责任审计","advice":"🟡一般推荐 | 🏛️政府项目 | 📋村级审计"},
            {"name":"含山县高标准农田竣工财务决算审计","unit":"含山县农业农村局","amount":"2.7万元","deadline":"2026-03-09","region":"安徽","link":"https://www.china-hxzb.com/zhaobiao/show.php?itemid=31123422","type":"竣工财务决算审计","advice":"💡小额项目 | 🏛️政府项目 | 🌾农业项目"},
            {"name":"淮河能源2025年度审计和内控审计","unit":"淮河能源（集团）股份有限公司","amount":"","deadline":"2026-03-04","region":"安徽","link":"https://www.china-hxzb.com/zhaobiao/show.php?itemid=31063009","type":"内部控制审计","advice":"🟠重点推荐 | ⚡能源行业 | 🏢大型国企"}
        ];

        let filteredData = [...tenderData];

        function getAmountValue(amountStr) {
            if (!amountStr || amountStr.includes('未明确') || amountStr.includes('框架协议')) return 0;
            const match = amountStr.match(/(\d+\.?\d*)/);
            if (!match) return 0;
            let val = parseFloat(match[1]);
            if (amountStr.includes('万')) val = val;
            else if (amountStr.includes('元')) val = val / 10000;
            return val;
        }

        function getAmountBadge(amount) {
            const value = getAmountValue(amount);
            if (value >= 30) return '<span class="bg-red-100 text-red-700 px-2 py-1 rounded-full text-xs font-bold">≥30万</span>';
            if (value >= 10) return '<span class="bg-yellow-100 text-yellow-700 px-2 py-1 rounded-full text-xs font-bold">10-30万</span>';
            if (value > 0) return '<span class="bg-green-100 text-green-700 px-2 py-1 rounded-full text-xs"><10万</span>';
            return '<span class="bg-gray-100 text-gray-500 px-2 py-1 rounded-full text-xs">待查</span>';
        }

        function renderProjects() {
            const grid = document.getElementById('projectGrid');
            const emptyState = document.getElementById('emptyState');
            const showingCount = document.getElementById('showingCount');
            
            showingCount.textContent = filteredData.length;
            
            if (filteredData.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            
            grid.innerHTML = filteredData.map(item => `
                <div class="card-hover bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="p-6">
                        <div class="flex items-start justify-between mb-3">
                            ${getAmountBadge(item.amount)}
                            <span class="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded">${item.region}</span>
                        </div>
                        
                        <h3 class="font-semibold text-gray-800 mb-2 line-clamp-2 h-12" title="${item.name}">${item.name}</h3>
                        
                        <div class="mb-2">
                            <span class="inline-block bg-purple-50 text-purple-600 text-xs px-2 py-1 rounded">${item.type}</span>
                        </div>
                        
                        <div class="space-y-2 text-sm">
                            <div class="flex items-center gap-2 text-gray-600">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-purple-500 flex-shrink-0"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"></path><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"></path><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"></path></svg>
                                <span class="truncate" title="${item.unit}">${item.unit}</span>
                            </div>
                            
                            <div class="flex items-center gap-2 text-gray-600">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-500 flex-shrink-0"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                <span>截止：${item.deadline}</span>
                            </div>
                        </div>
                        
                        <div class="mt-3 pt-3 border-t border-gray-100">
                            <p class="text-xs text-gray-500 line-clamp-1" title="${item.advice}">${item.advice}</p>
                        </div>
                        
                        <a href="${item.link}" target="_blank" 
                            class="mt-4 flex items-center justify-center gap-2 w-full py-2.5 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition-colors text-sm font-medium">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                            查看招标原文
                        </a>
                    </div>
                </div>
            `).join('');
        }

        function filterProjects() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const region = document.getElementById('regionFilter').value;
            const amountFilter = document.getElementById('amountFilter').value;
            
            filteredData = tenderData.filter(item => {
                const matchSearch = !searchTerm || item.name.toLowerCase().includes(searchTerm) || item.unit.toLowerCase().includes(searchTerm);
                const matchRegion = !region || item.region.includes(region);
                
                let matchAmount = true;
                const amount = getAmountValue(item.amount);
                if (amountFilter === '30') matchAmount = amount >= 30;
                else if (amountFilter === '10') matchAmount = amount >= 10 && amount < 30;
                else if (amountFilter === '0') matchAmount = amount > 0 && amount < 10;
                
                return matchSearch && matchRegion && matchAmount;
            });
            renderProjects();
        }

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('regionFilter').value = '';
            document.getElementById('amountFilter').value = '';
            filteredData = [...tenderData];
            renderProjects();
        }

        document.getElementById('searchInput').addEventListener('input', filterProjects);
        document.getElementById('regionFilter').addEventListener('change', filterProjects);
        document.getElementById('amountFilter').addEventListener('change', filterProjects);

        renderProjects();
    </script>
</body>
</html>
